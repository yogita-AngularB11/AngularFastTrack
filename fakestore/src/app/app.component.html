<div class="products" [ngClass]="{'dark':isDark}">
  <div *ngFor="let product of products" class="product" [ngStyle]="{'background-color':bgColor}">
    <img src="{{product.image}}" alt="" width="100px" height="100px">
    <h3>{{product.title}}</h3>
    <h4>price::{{product.price}}</h4>
    <button>Add To Cart</button>
  </div>
</div>
