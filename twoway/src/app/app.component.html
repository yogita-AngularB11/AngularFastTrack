<h1>One Way Data Binding</h1>
<!-- input has onChange Event in HTML and (change) in angular -->
<input type="text" name="" id="" (change)="handleInputChange($event)" >

<h2>My Name is {{name}}</h2>


<h1>Two Way Data Binding</h1>
<!-- to use default function you need to import package similarly to use ngModel you have to import Module-->
<input type="text"  [(ngModel)]="twoWayInp">
<h2>My Name is {{twoWayInp}}</h2>
